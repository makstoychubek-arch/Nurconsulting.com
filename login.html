<head>

    <title>NR Space — Вход</title>
    <script>
        (function () {
            var h = window.location.hash || '';
            var q = new URLSearchParams(window.location.search);
            if (h.indexOf('access_token') !== -1 || h.indexOf('type=recovery') !== -1 || q.has('code')) {
                document.documentElement.classList.add('oauth-pending');
            }
        })();
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: { dark: '#030303', navy: '#070B19', purple: '#6D28D9', accent: '#A78BFA' }

    <style>
        .glass-card {
            background: rgba(13, 13, 25, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }
        .input-field {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: rgba(109, 40, 217, 0.6);
            background: rgba(109, 40, 217, 0.05);
            box-shadow: 0 0 0 3px rgba(109, 40, 217, 0.1);
        }
        .neon-glow { box-shadow: 0 0 30px rgba(109, 40, 217, 0.3); }
        .tab-active {
            background: rgba(109, 40, 217, 0.2);
            border-color: rgba(109, 40, 217, 0.5);
            color: white;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 40px rgba(109,40,217,0.4); }
            50% { box-shadow: 0 0 80px rgba(109,40,217,0.7), 0 0 120px rgba(109,40,217,0.3); }
        }
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        #screen-oauth-loading {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #030303;
        }
        html.oauth-pending #screen-auth { display: none !important; }
        html.oauth-pending #screen-oauth-loading { display: flex !important; }
        .oauth-logo {
            width: 88px; height: 88px;
            background: linear-gradient(135deg, #6D28D9, #4C1D95);
            border-radius: 26px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 28px;
            animation: pulse-glow 2s ease infinite;
        }
        .oauth-logo span { color: white; font-size: 34px; font-weight: 900; letter-spacing: -0.04em; }
        .oauth-space {
            color: white;
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 0.12em;
            margin-bottom: 20px;
        }
        .nr-brand-mark {
            width: 44px; height: 44px;
            border-radius: 14px;
            background: #fff;
            color: #030303;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: -0.05em;
            display: flex; align-items: center; justify-content: center;
        }
        .nr-brand-space {
            font-size: 22px;
            font-weight: 500;
            color: #fff;
            letter-spacing: 0.08em;
        }
        html.oauth-pending .oauth-home-link { display: none; }
        .oauth-loading-text {
            color: #9ca3af;
            font-size: 14px;
            line-height: 1.6;
            text-align: center;

        }
        .oauth-dots { display: flex; gap: 10px; margin-top: 28px; }

            width: 10px; height: 10px; border-radius: 50%;

        }
        .oauth-dots span:nth-child(2) { animation-delay: 150ms; }
        .oauth-dots span:nth-child(3) { animation-delay: 300ms; }

<body class="bg-[#030303] text-gray-200 font-sans antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- ЭКРАН 1: ВХОД / РЕГИСТРАЦИЯ -->
    <div id="screen-auth" class="w-full max-w-md fade-in">
        <div class="glass-card rounded-3xl p-8 shadow-2xl">

            <div class="text-center mb-8">
                <div class="flex items-center justify-center gap-2.5 mb-5">

            <div class="flex bg-white/5 rounded-xl p-1 mb-6 border border-white/5">

            <button onclick="signInWithGoogle()"

                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>

                <span class="text-xs text-gray-500">или через email</span>
                <div class="flex-1 h-px bg-white/8"></div>
            </div>

            <!-- Форма ВХОД -->
            <div id="form-login" class="space-y-3">
                <input type="email" id="login-email" placeholder="Email адрес"
                    class="input-field w-full px-4 py-3 rounded-xl text-white text-sm placeholder-gray-500">
                <div class="relative">
                    <input type="password" id="login-password" placeholder="Пароль"
                        class="input-field w-full px-4 py-3 rounded-xl text-white text-sm placeholder-gray-500 pr-12">
                    <button onclick="togglePassword('login-password')" class="absolute right-3 top-3 text-gray-500 hover:text-gray-300 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>

                    <button onclick="switchTab('forgot')" class="text-xs text-purple-400 hover:text-purple-300 transition">

                <div id="login-error" class="hidden text-xs text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></div>

                    class="w-full py-3 bg-purple-700 hover:bg-purple-600 text-white font-medium rounded-xl transition neon-glow text-sm">
                    Продолжить

            </div>

            <!-- Форма РЕГИСТРАЦИЯ -->
            <div id="form-register" class="space-y-3 hidden">
                <input type="text" id="reg-name" placeholder="Ваше имя"
                    class="input-field w-full px-4 py-3 rounded-xl text-white text-sm placeholder-gray-500">
                <input type="email" id="reg-email" placeholder="Email адрес"
                    class="input-field w-full px-4 py-3 rounded-xl text-white text-sm placeholder-gray-500">
                <div class="relative">
                    <input type="password" id="reg-password" placeholder="Пароль (минимум 8 символов)"
                        class="input-field w-full px-4 py-3 rounded-xl text-white text-sm placeholder-gray-500 pr-12">
                    <button onclick="togglePassword('reg-password')" class="absolute right-3 top-3 text-gray-500 hover:text-gray-300 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
                <div class="relative">
                    <input type="password" id="reg-password-confirm" placeholder="Подтвердите пароль"
                        class="input-field w-full px-4 py-3 rounded-xl text-white text-sm placeholder-gray-500 pr-12">
                    <button onclick="togglePassword('reg-password-confirm')" class="absolute right-3 top-3 text-gray-500 hover:text-gray-300 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>

                <div id="reg-error" class="hidden text-xs text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></div>
                <div id="reg-success" class="hidden text-xs text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 rounded-lg px-3 py-2">
                    ✅ Письмо с подтверждением отправлено на вашу почту!
                </div>
                <button onclick="handleRegister()"
                    class="w-full py-3 bg-purple-700 hover:bg-purple-600 text-white font-medium rounded-xl transition neon-glow text-sm">
                    Создать аккаунт
                </button>
            </div>

            <!-- Форма ЗАБЫЛ ПАРОЛЬ -->
            <div id="form-forgot" class="space-y-3 hidden">
                <p class="text-sm text-gray-400 text-center mb-2">Введите email — пришлём ссылку для сброса пароля</p>
                <input type="email" id="forgot-email" placeholder="Ваш email адрес"
                    class="input-field w-full px-4 py-3 rounded-xl text-white text-sm placeholder-gray-500">
                <div id="forgot-error" class="hidden text-xs text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></div>
                <div id="forgot-success" class="hidden text-xs text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 rounded-lg px-3 py-2">
                    ✅ Письмо отправлено! Проверьте почту.
                </div>
                <button onclick="handleForgotPassword(event)"
                    class="w-full py-3 bg-purple-700 hover:bg-purple-600 text-white font-medium rounded-xl transition neon-glow text-sm">
                    Отправить ссылку
                </button>
                <button onclick="switchTab('login')" class="w-full py-2 text-sm text-gray-400 hover:text-white transition">

                </button>

        </div>
    </div>

    <!-- ЭКРАН 2: ПРИВЕТСТВИЕ (legacy, не показывается при OAuth) -->
    <div id="screen-cabinets" class="w-full max-w-md fade-in hidden text-center">
        <div style="padding:40px 20px">
            <div style="width:90px;height:90px;background:#fff;border-radius:26px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:pulse-glow 2s ease infinite">
                <span style="color:#030303;font-size:32px;font-weight:900;letter-spacing:-0.04em">NR</span>
            </div>
            <div style="color:#9ca3af;font-size:14px;font-weight:500;letter-spacing:0.12em;margin-bottom:28px">Space</div>
            <h2 style="color:white;font-size:20px;font-weight:600;margin-bottom:10px">Добро пожаловать, <span id="user-name" style="color:#a78bfa">—</span></h2>
            <p style="color:#6b7280;font-size:13px;margin-bottom:36px;line-height:1.6">Вход в NR Space...</p>
            <div style="display:flex;justify-content:center;gap:10px">
                <div style="width:12px;height:12px;background:#7C3AED;border-radius:50%;animation:bounce 1s infinite 0ms"></div>
                <div style="width:12px;height:12px;background:#8B5CF6;border-radius:50%;animation:bounce 1s infinite 150ms"></div>
                <div style="width:12px;height:12px;background:#A78BFA;border-radius:50%;animation:bounce 1s infinite 300ms"></div>
            </div>
        </div>
    </div>

    <script>
        SUPABASE_URL = 'https://fiukyfyhotctvfdidktx.supabase.co';
        SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpdWt5Znlob3RjdHZmZGlka3R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMDE5NzcsImV4cCI6MjA5Nzg3Nzk3N30.vX31uMBCEj-wjjR6qmFkwWammg70Av2h6I4YUnewL9Q';
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function switchTab(tab) {
            document.getElementById('form-login').classList.add('hidden');
            document.getElementById('form-register').classList.add('hidden');
            document.getElementById('form-forgot').classList.add('hidden');
            document.getElementById('tab-login')?.classList.remove('tab-active');
            document.getElementById('tab-register')?.classList.remove('tab-active');
            document.getElementById('tab-login')?.classList.add('text-gray-400');
            document.getElementById('tab-register')?.classList.add('text-gray-400');

            if (tab === 'login') {
                document.getElementById('form-login').classList.remove('hidden');
                document.getElementById('tab-login').classList.add('tab-active');
                document.getElementById('tab-login').classList.remove('text-gray-400');
            } else if (tab === 'register') {
                document.getElementById('form-register').classList.remove('hidden');
                document.getElementById('tab-register').classList.add('tab-active');
                document.getElementById('tab-register').classList.remove('text-gray-400');
            } else if (tab === 'forgot') {
                document.getElementById('form-forgot').classList.remove('hidden');
            }
        }

        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        const OAUTH_LOADING_TEXT = 'Вход в NR Space...';

        async function signInWithGoogle() {
            showOAuthLoading(OAUTH_LOADING_TEXT);
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/login.html' }
            });
            if (error) {
                hideOAuthLoading();
                showAuthScreen();
                showError('login-error', error.message);
            }
        }

        const SUPER_ADMIN_EMAIL = 'global.pro.1004@gmail.com';
        const SUPER_ADMIN_ID = '2f7d8960-0df4-4a17-be70-f2cb2ac0032e';

        function isSuperAdminUser(user) {
            if (!user) return false;
            return String(user.email || '').toLowerCase() === SUPER_ADMIN_EMAIL || user.id === SUPER_ADMIN_ID;
        }

        function extractGoogleProfile(user) {
            const meta = user?.user_metadata || user?.raw_user_meta_data || {};
            const firstName = meta.given_name || meta.first_name || '';
            const lastName = meta.family_name || meta.last_name || '';
            let fullName = meta.full_name || meta.name || '';
            if (!fullName && (firstName || lastName)) {
                fullName = [firstName, lastName].filter(Boolean).join(' ');
            }
            const avatarUrl = meta.avatar_url || meta.picture || '';
            return { first_name: firstName, last_name: lastName, full_name: fullName, avatar_url: avatarUrl };
        }

        async function syncSpaceProfile(user) {
            if (!user?.id) return null;
            const p = extractGoogleProfile(user);
            const { error } = await supabase.rpc('upsert_space_sign_in', {
                p_first_name: p.first_name,
                p_last_name: p.last_name,
                p_full_name: p.full_name,
                p_avatar_url: p.avatar_url,
            });
            if (error) console.warn('[spaces] sync profile:', error.message);
            return p;
        }

        async function handleLogin() {
            const email = (document.getElementById('login-email')?.value || '').trim().toLowerCase();
            if (email === SUPER_ADMIN_EMAIL) {
                showError('login-error', 'Для Super Admin доступен только вход через Google.');
                return;
            }
            showError('login-error', 'Пожалуйста, используйте кнопку "Войти через Google"');
        }

        async function handleRegister() {
            showError('reg-error', 'Регистрация через email недоступна. Используйте Google.');
        }
        

        async function handleForgotPassword(event) {
            const email = document.getElementById('forgot-email').value.trim();
            if (!email) { showError('forgot-error', 'Введите email'); return; }
            const btn = event.currentTarget;
            btn.textContent = 'Отправляем...'; btn.disabled = true;
            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/reset-password'
            });
            if (error) { showError('forgot-error', error.message); }
            else { document.getElementById('forgot-success').classList.remove('hidden'); }
            btn.textContent = 'Отправить ссылку'; btn.disabled = false;
        }

        function showOAuthLoading(message) {
            document.documentElement.classList.add('oauth-pending');
            document.getElementById('screen-auth')?.classList.add('hidden');
            document.getElementById('screen-cabinets')?.classList.add('hidden');
            const loader = document.getElementById('screen-oauth-loading');
            const text = document.getElementById('oauth-loading-text');
            if (text && message) text.textContent = message;
            loader?.classList.remove('hidden');
            loader?.style.setProperty('display', 'flex');
        }

        function hideOAuthLoading() {
            document.documentElement.classList.remove('oauth-pending');
            const loader = document.getElementById('screen-oauth-loading');
            if (loader) { loader.classList.add('hidden'); loader.style.display = 'none'; }
        }

        function showAuthScreen() {
            hideOAuthLoading();
            document.getElementById('screen-cabinets')?.classList.add('hidden');
            document.getElementById('screen-auth')?.classList.remove('hidden');
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            _authFlowHandled = false;
            showAuthScreen();
        }

        async function denyLoginAccess(errorCode) {
            try { await supabase.auth.signOut({ scope: 'global' }); } catch (_) {}
            try { localStorage.removeItem('nr_session_key'); } catch (_) {}
            _authFlowHandled = false;
            window.location.replace('/login?error=' + encodeURIComponent(errorCode || 'access_denied'));
        }

        async function showCabinets(user) {
            const isSuperAdmin = isSuperAdminUser(user);

            // Фиксируем попытку в лог OAuth (даже если доступ закрыт)
            const profile = await syncSpaceProfile(user);

            if (!isSuperAdmin) {
                const { data: space, error: spaceErr } = await supabase
                    .from('spaces')
                    .select('status')
                    .eq('user_id', user.id)
                    .maybeSingle();

                if (spaceErr && spaceErr.code !== 'PGRST116') {
                    hideOAuthLoading();
                    showAuthScreen();
                    showError('login-error', 'Ошибка проверки доступа. Попробуйте позже.');
                    _authFlowHandled = false;
                    return;
                }

                if (space?.status !== 'active') {
                    const code = space?.status === 'blocked' ? 'blocked' : 'access_denied';
                    await denyLoginAccess(code);
                    return;
                }
            }

            // Только экран загрузки — без мигания формы логина
            showOAuthLoading(OAUTH_LOADING_TEXT);

            const name = profile?.full_name || user.user_metadata?.full_name || user.email?.split('@')[0] || 'Пользователь';
            document.getElementById('user-name').textContent = name;

            // Переход в Space за ~1.2 с без мигания формы логина
            setTimeout(() => {
                document.body.style.transition = 'opacity 0.5s ease';
                document.body.style.opacity = '0';
                setTimeout(() => { window.location.href = '/space'; }, 500);
            }, 1200);
        }

        function showError(id, message) {
            const el = document.getElementById(id);
            if (el) { el.textContent = '❌ ' + message; el.classList.remove('hidden'); }
        }

        let _authFlowHandled = false;

        async function startAuthFlow(user) {
            if (_authFlowHandled) return;
            _authFlowHandled = true;
            await showCabinets(user);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const authError = urlParams.get('error');
            const hash = window.location.hash || '';
            const isOAuthReturn = hash.includes('access_token') || urlParams.has('code');

            if (isOAuthReturn && !authError) {
                showOAuthLoading(OAUTH_LOADING_TEXT);
            }

            if (urlParams.get('tab') === 'register') switchTab('register');

            if (authError === 'access_denied') {
                showAuthScreen();
                showError('login-error', 'Доступ к NR Space закрыт. Дождитесь активации спейса администратором.');
            } else if (authError === 'blocked') {
                showAuthScreen();
                showError('login-error', 'Ваш спейс заблокирован. Обратитесь в поддержку NR Space.');
            } else if (authError === 'access_check_failed') {
                showAuthScreen();
                showError('login-error', 'Не удалось проверить доступ. Попробуйте войти снова через несколько минут.');
            }

            supabase.auth.onAuthStateChange(async (event, session) => {
                if (!session?.user) return;
                if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION' || event === 'TOKEN_REFRESHED') {
                    await syncSpaceProfile(session.user);
                }
                if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
                    const err = new URLSearchParams(window.location.search).get('error');
                    if (err) {
                        try { await supabase.auth.signOut({ scope: 'global' }); } catch (_) {}
                        return;
                    }
                    showOAuthLoading(OAUTH_LOADING_TEXT);
                    await startAuthFlow(session.user);
                }
            });

            const { data: { session } } = await supabase.auth.getSession();
            if (authError && session?.user) {
                try { await supabase.auth.signOut({ scope: 'global' }); } catch (_) {}
            } else if (session?.user) {
                showOAuthLoading(OAUTH_LOADING_TEXT);
                await startAuthFlow(session.user);
            } else if (!isOAuthReturn) {
                showAuthScreen();
            }
        });
    </script>
</body>
</html>
