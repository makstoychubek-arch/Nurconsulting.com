<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR Consulting — Вход в платформу</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: { dark: '#030303', navy: '#070B19', purple: '#6D28D9', accent: '#A78BFA' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(13, 13, 25, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }
        .input-field {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: rgba(109, 40, 217, 0.6);
            background: rgba(109, 40, 217, 0.05);
            box-shadow: 0 0 0 3px rgba(109, 40, 217, 0.1);
        }
        .neon-glow { box-shadow: 0 0 30px rgba(109, 40, 217, 0.3); }
        .tab-active {
            background: rgba(109, 40, 217, 0.2);
            border-color: rgba(109, 40, 217, 0.5);
            color: white;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }

        /* Скелетон загрузки кабинетов */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-[#030303] text-gray-200 font-sans antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Фоновые свечения -->
    <div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-purple-900/10 rounded-full blur-[130px] pointer-events-none"></div>
    <div class="absolute bottom-0 right-1/4 w-[400px] h-[400px] bg-blue-900/8 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- Логотип наверху -->
    <a href="/" class="absolute top-6 left-6 flex flex-col justify-center tracking-wider">
        <span class="text-2xl font-bold text-white leading-none">NR</span>
        <span class="text-[9px] uppercase tracking-[0.25em] text-gray-400 mt-0.5">Consulting</span>
    </a>

    <!-- ===== ЭКРАН 1: ВХОД / РЕГИСТРАЦИЯ ===== -->
    <div id="screen-auth" class="w-full max-w-md fade-in">
        <div class="glass-card rounded-3xl p-8 shadow-2xl">

            <!-- Заголовок -->
            <div class="text-center mb-8">
                <div class="w-12 h-12 bg-purple-950/60 border border-purple-500/30 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-white">Nur Platform</h1>
                <p class="text-sm text-gray-400 mt-1">Аналитика Wildberries для вашего бизнеса</p>
            </div>

            <!-- Переключатель Вход / Регистрация -->
            <div class="flex bg-white/5 rounded-xl p-1 mb-6 border border-white/5">
                <button onclick="switchTab('login')" id="tab-login"
                    class="flex-1 py-2 text-sm font-medium rounded-lg transition tab-active border border-transparent">
                    Вход
                </button>
                <button onclick="switchTab('register')" id="tab-register"
                    class="flex-1 py-2 text-sm font-medium rounded-lg transition text-gray-400 border border-transparent">
                    Регистрация
                </button>
            </div>

            <!-- Кнопка Google -->
            <button onclick="signInWithGoogle()"
                class="w-full flex items-center justify-center space-x-3 py-3 bg-white hover:bg-gray-50 text-gray-800 font-medium rounded-xl transition mb-5 shadow-lg">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Войти через Google</span>
            </button>

            <!-- Разделитель -->
            <div class="flex items-center space-x-3 mb-5">
                <div class="flex-1 h-px bg-white/8"></div>
                <span class="text-xs text-gray-500">или через email</span>
                <div class="flex-1 h-px bg-white/8"></div>
            </div>

            <!-- Форма ВХОД -->
            <div id="form-login" class="space-y-3">
                <input type="email" id="login-email" placeholder="Email адрес"
                    class="input-field w-full px-4 py-3 rounded-xl text-white text-sm placeholder-gray-500">
                <div class="relative">
                    <input type="password" id="login-password" placeholder="Пароль"
                        class="input-field w-full px-4 py-3 rounded-xl text-white text-sm placeholder-gray-500 pr-12">
                    <button onclick="togglePassword('login-password')" class="absolute right-3 top-3 text-gray-500 hover:text-gray-300 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
                <div class="text-right">
                    <button onclick="switchTab('forgot')" class="text-xs text-purple-400 hover:text-purple-300 transition">
                        Забыли пароль?
                    </button>
                </div>
                <div id="login-error" class="hidden text-xs text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></div>
                <button onclick="handleLogin()"
                    class="w-full py-3 bg-purple-700 hover:bg-purple-600 text-white font-medium rounded-xl transition neon-glow text-sm">
                    Войти в платформу
                </button>
            </div>

            <!-- Форма РЕГИСТРАЦИЯ -->
            <div id="form-register" class="space-y-3 hidden">
                <input type="text" id="reg-name" placeholder="Ваше имя"
                    class="input-field w-full px-4 py-3 rounded-xl text-white text-sm placeholder-gray-500">
                <input type="email" id="reg-email" placeholder="Email адрес"
                    class="input-field w-full px-4 py-3 rounded-xl text-white text-sm placeholder-gray-500">
                <div class="relative">
                    <input type="password" id="reg-password" placeholder="Пароль (минимум 8 сиволов)"
                        class="input-field w-full px-4 py-3 rounded-xl text-white text-sm placeholder-gray-500 pr-12">
                    <button onclick="togglePassword('reg-password')" class="absolute right-3 top-3 text-gray-500 hover:text-gray-300 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
                <div class="relative">
    <input type="password" id="reg-password-confirm" placeholder="Подтвердите пароль (мин. 8 символов)"
        class="input-field w-full px-4 py-3 rounded-xl text-white text-sm placeholder-gray-500 pr-12">
    <button type="button" onclick="togglePassword('reg-password-confirm')" class="absolute right-3 top-3 text-gray-500 hover:text-gray-300 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
    </button>
</div>
                <div id="reg-error" class="hidden text-xs text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></div>
                <div id="reg-success" class="hidden text-xs text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 rounded-lg px-3 py-2">
                    ✅ Письмо с подтверждением отправлено на вашу почту!
                </div>
                <button onclick="handleRegister()"
                    class="w-full py-3 bg-purple-700 hover:bg-purple-600 text-white font-medium rounded-xl transition neon-glow text-sm">
                    Создать аккаунт
                </button>
            </div>

            <!-- Форма ЗАБЫЛ ПАРОЛЬ -->
            <div id="form-forgot" class="space-y-3 hidden">
                <p class="text-sm text-gray-400 text-center mb-2">Введите email — пришлём ссылку для сброса пароля</p>
                <input type="email" id="forgot-email" placeholder="Ваш email адрес"
                    class="input-field w-full px-4 py-3 rounded-xl text-white text-sm placeholder-gray-500">
                <div id="forgot-error" class="hidden text-xs text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></div>
                <div id="forgot-success" class="hidden text-xs text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 rounded-lg px-3 py-2">
                    ✅ Письмо отправлено! Проверьте почту.
                </div>
                <button onclick="handleForgotPassword()"
                    class="w-full py-3 bg-purple-700 hover:bg-purple-600 text-white font-medium rounded-xl transition neon-glow text-sm">
                    Отправить ссылку
                </button>
                <button onclick="switchTab('login')" class="w-full py-2 text-sm text-gray-400 hover:text-white transition">
                    ← Вернуться к входу
                </button>
            </div>

        </div>
    </div>

    <!-- ===== ЭКРАН 2: ВЫБОР КАБИНЕТА ===== -->
    <div id="screen-cabinets" class="w-full max-w-2xl fade-in hidden">
        <div class="glass-card rounded-3xl p-8 shadow-2xl">

            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-white">Выберите кабинет</h2>
                    <p class="text-sm text-gray-400 mt-1">Привет, <span id="user-name" class="text-purple-400">—</span></p>
                </div>
                <button onclick="handleLogout()" class="text-xs text-gray-500 hover:text-gray-300 transition flex items-center space-x-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    <span>Выйти</span>
                </button>
            </div>

            <!-- Список кабинетов -->
            <div id="cabinets-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- Скелетоны пока загружается -->
                <div class="skeleton h-24"></div>
                <div class="skeleton h-24"></div>
                <div class="skeleton h-24"></div>
                <div class="skeleton h-24"></div>
            </div>

        </div>
    </div>

    <script>
        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ SUPABASE
        // ============================================================
        SUPABASE_URL = 'https://fiukyfyhotctvfdidktx.supabase.co';
        SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpdWt5Znlob3RjdHZmZGlka3R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMDE5NzcsImV4cCI6MjA5Nzg3Nzk3N30.vX31uMBCEj-wjjR6qmFkwWammg70Av2h6I4YUnewL9Q';
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================================
        // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        // ============================================================
        function switchTab(tab) {
            document.getElementById('form-login').classList.add('hidden');
            document.getElementById('form-register').classList.add('hidden');
            document.getElementById('form-forgot').classList.add('hidden');

            document.getElementById('tab-login')?.classList.remove('tab-active');
            document.getElementById('tab-register')?.classList.remove('tab-active');
            document.getElementById('tab-login')?.classList.add('text-gray-400');
            document.getElementById('tab-register')?.classList.add('text-gray-400');

            if (tab === 'login') {
                document.getElementById('form-login').classList.remove('hidden');
                document.getElementById('tab-login').classList.add('tab-active');
                document.getElementById('tab-login').classList.remove('text-gray-400');
            } else if (tab === 'register') {
                document.getElementById('form-register').classList.remove('hidden');
                document.getElementById('tab-register').classList.add('tab-active');
                document.getElementById('tab-register').classList.remove('text-gray-400');
            } else if (tab === 'forgot') {
                document.getElementById('form-forgot').classList.remove('hidden');
            }
        }

        // ============================================================
        // ПОКАЗАТЬ/СКРЫТЬ ПАРОЛЬ
        // ============================================================
        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // ============================================================
        // ВХОД ЧЕРЕЗ GOOGLE
        // ============================================================
        async function signInWithGoogle() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/login.html' }
            });
            if (error) showError('login-error', error.message);
        }

        // ============================================================
        // ВХОД ЧЕРЕЗ EMAIL / ПАРОЛЬ
        // ============================================================
        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!email || !password) {
                showError('login-error', 'Заполните все поля');
                return;
            }

            const btn = event.target;
            btn.textContent = 'Входим...';
            btn.disabled = true;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                showError('login-error', 'Неверный email или пароль');
                btn.textContent = 'Войти в платформу';
                btn.disabled = false;
                return;
            }

            showCabinets(data.user);
        }

        // ============================================================
        // РЕГИСТРАЦИЯ
        // ============================================================
        async function handleRegister() {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!name || !email || !password) {
                showError('reg-error', 'Заполните все поля');
                return;
            }
            if (password.length < 8) {
                  showError('reg-error', 'Пароль должен быть минимум 8 символов');
                  return;   
            }

            const btn = event.target;
            btn.textContent = 'Создаём аккаунт...';
            btn.disabled = true;

            const { error } = await supabase.auth.signUp({
                email,
                password,
                options: { data: { full_name: name } }
            });

            if (error) {
                showError('reg-error', error.message);
                btn.textContent = 'Создать аккаунт';
                btn.disabled = false;
                return;
            }

            document.getElementById('reg-success').classList.remove('hidden');
            btn.textContent = 'Создать аккаунт';
            btn.disabled = false;
        }

        // ============================================================
        // ЗАБЫЛ ПАРОЛЬ
        // ============================================================
        async function handleForgotPassword() {
            const email = document.getElementById('forgot-email').value.trim();

            if (!email) {
                showError('forgot-error', 'Введите email адрес');
                return;
            }

            const btn = event.target;
            btn.textContent = 'Отправляем...';
            btn.disabled = true;

            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/reset-password.html'
            });

            if (error) {
                showError('forgot-error', error.message);
            } else {
                document.getElementById('forgot-success').classList.remove('hidden');
                document.getElementById('forgot-error').classList.add('hidden');
            }

            btn.textContent = 'Отправить ссылку';
            btn.disabled = false;
        }

        // ============================================================
        // ВЫХОД
        // ============================================================
        async function handleLogout() {
            await supabase.auth.signOut();
            document.getElementById('screen-cabinets').classList.add('hidden');
            document.getElementById('screen-auth').classList.remove('hidden');
        }

        // ============================================================
        // ПОКАЗАТЬ ЭКРАН ВЫБОРА КАБИНЕТА
        // ============================================================
       async function showCabinets(user) {
    document.getElementById('screen-auth').classList.add('hidden');
    
    const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Пользователь';
    
    // Показываем приветственный экран
    const cabinetsDiv = document.getElementById('screen-cabinets');
    cabinetsDiv.classList.remove('hidden');
    cabinetsDiv.innerHTML = `
        <div style="text-align:center;padding:40px 20px">
            <div style="width:80px;height:80px;background:linear-gradient(135deg,#6D28D9,#4C1D95);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 0 60px rgba(109,40,217,0.5)">
                <span style="color:white;font-size:32px;font-weight:900">N</span>
            </div>
            <div style="color:white;font-size:22px;font-weight:700;margin-bottom:8px">NR Consulting</div>
            <div style="color:#6b7280;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:32px">Nur Platform Analytics</div>
            <div style="color:white;font-size:18px;font-weight:600;margin-bottom:8px">Добро пожаловать, <span style="color:#a78bfa">${name}</span>!</div>
            <div style="color:#6b7280;font-size:13px;margin-bottom:32px">Спасибо, что выбрали нас.<br>Загружаем вашу аналитику...</div>
            <div style="display:flex;justify-content:center;gap:8px;margin-bottom:32px">
                <div style="width:10px;height:10px;background:#7C3AED;border-radius:50%;animation:bounce 1s infinite 0ms"></div>
                <div style="width:10px;height:10px;background:#8B5CF6;border-radius:50%;animation:bounce 1s infinite 150ms"></div>
                <div style="width:10px;height:10px;background:#A78BFA;border-radius:50%;animation:bounce 1s infinite 300ms"></div>
            </div>
        </div>
        <style>
            @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        </style>
    `;
    
    // Через 2.5 сек — плавный переход
    setTimeout(() => {
        document.body.style.transition = 'opacity 0.8s ease';
        document.body.style.opacity = '0';
        setTimeout(() => { window.location.href = '/space'.html'; }, 800);
    }, 2500);

        }

        // ============================================================
        // ЗАГРУЗКА КАБИНЕТОВ
        // ============================================================
        async function loadCabinets() {
            const { data, error } = await supabase
                .from('cabinets')
                .select('id, name')
                .order('name');

            const grid = document.getElementById('cabinets-grid');

            if (error || !data || data.length === 0) {
                grid.innerHTML = '<div class="col-span-2 text-center text-gray-500 py-8">Кабинеты не найдены</div>';
                return;
            }

            const colors = ['purple', 'blue', 'emerald', 'amber', 'pink'];
            const icons = ['🏪', '👗', '✨', '🎯', '💎'];

            grid.innerHTML = data.map((cab, i) => `
                <button onclick="selectCabinet('${cab.id}', '${cab.name}')"
                    class="glass-card p-6 rounded-2xl text-left hover:border-purple-500/40 transition group border border-white/5">
                    <div class="text-3xl mb-3">${icons[i] || '🏪'}</div>
                    <h3 class="text-white font-bold text-lg group-hover:text-purple-300 transition">${cab.name}</h3>
                    <p class="text-xs text-gray-500 mt-1 flex items-center space-x-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 inline-block"></span>
                        <span>Wildberries • Активен</span>
                    </p>
                </button>
            `).join('');
        }

        // ============================================================
        // ВЫБОР КАБИНЕТА → ПЕРЕХОД НА ДАШБОРД
        // ============================================================
        function selectCabinet(id, name) {
            localStorage.setItem('selected_cabinet_id', id);
            localStorage.setItem('selected_cabinet_name', name);
            window.location.href = '/space.html';
        }

        // ============================================================
        // HELPER: ПОКАЗАТЬ ОШИБКУ
        // ============================================================
        function showError(id, message) {
            const el = document.getElementById(id);
            if (el) {
                el.textContent = '❌ ' + message;
                el.classList.remove('hidden');
            }
        }

        // ============================================================
        // ПРОВЕРЯЕМ СЕССИЮ ПРИ ЗАГРУЗКЕ
       document.addEventListener('DOMContentLoaded', async () => {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('tab') === 'register') switchTab('register');
    const { data: { session } } = await supabase.auth.getSession();
    if (session?.user) {
        showCabinets(session.user);
    }
});
