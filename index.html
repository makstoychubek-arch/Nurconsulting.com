<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAZ.A</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #121212; /* Дорогой глубокий темный оттенок */
            color: #E5E5E5; /* Мягкий белый цвет для текста */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            letter-spacing: 0.15em; /* Стильное премиальное расстояние между буквами */
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            font-weight: 300; /* Тонкое, изящное начертание */
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        p {
            font-size: 0.85rem;
            color: #8E8E93; /* Приглушенный серый цвет */
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BAZ.A</h1>
        <p>Скоро открытие</p>
    </div>
</body>
</html>
